<!DOCTYPE html>
<html>
<head>
    <title>Login - Pacopolis Voting</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f5f5f3;
        }

        .card {
            background: white;
            border: 1px solid #e5e5e5;
            border-radius: 12px;
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 380px;
        }

        .badge {
            display: inline-block;
            background: #e6f1fb;
            color: #185fa5;
            font-size: 11px;
            padding: 3px 10px;
            border-radius: 6px;
            margin-bottom: 1.25rem;
        }

        h1 {
            font-size: 22px;
            font-weight: 500;
            margin-bottom: 0.35rem;
        }

        .subtitle {
            font-size: 14px;
            color: #888;
            margin-bottom: 2rem;
        }

        label {
            display: block;
            font-size: 13px;
            color: #666;
            margin-bottom: 5px;
        }

        .field {
            margin-bottom: 1rem;
        }

        .name-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        input {
            width: 100%;
            padding: 0 12px;
            height: 38px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            font-family: sans-serif;
        }

            input[type="password"] {
                font-family: Verdana, sans-serif;
            }

            input:focus {
                border-color: #378add;
                box-shadow: 0 0 0 3px rgba(55,138,221,0.12);
            }

        .btn {
            width: 100%;
            height: 40px;
            margin-top: 1.5rem;
            background: #111;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
        }

            .btn:hover {
                background: #333;
            }

        .error {
            font-size: 13px;
            color: #c0392b;
            margin-top: 0.75rem;
            min-height: 18px;
        }

        hr {
            border: none;
            border-top: 1px solid #eee;
            margin: 1.5rem 0 0;
        }

        .footer {
            font-size: 12px;
            color: #aaa;
            text-align: center;
            margin-top: 1rem;
        }
    </style>
</head>
<body>
    <div class="card">
        <span class="badge">Pacopolis 2026</span>
        <h1>Voter login</h1>
        <p class="subtitle">Enter your details to access your ballot.</p>
        <div class="name-row">
            <div class="field">
                <label for="firstName">First name</label>
                <input type="text" id="firstName" placeholder="Jane">
            </div>
            <div class="field">
                <label for="lastName">Last name</label>
                <input type="text" id="lastName" placeholder="Doe">
            </div>
        </div>
        <div class="field">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="password">
        </div>
        <button class="btn" onclick="handleLogin()">Continue to ballot</button>
        <p class="error" id="error"></p>
        <hr>
        <p class="footer">Your vote is private and secure.</p>
    </div>

    <script>
        // UNFINISHED
        function handleLogin() {
            const first = document.getElementById('firstName').value;
            const last = document.getElementById('lastName').value;
            const pass = document.getElementById('password').value;

            // Bypasses credentials check (for now)
            window.location.href = "vote.html";
        }
    </script>
</body>
</html>
