<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pacopolis Mayor Election (2026)</title>

<style>
    body {
        font-family: sans-serif;
        background: #f5f5f3;
        margin: 0;
        padding: 0;
    }

    .container {
        max-width: 600px;
        margin: 60px auto;
        background: #fff;
        padding: 24px;
        border-radius: 10px;
        box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    h2 {
        margin-top: 0;
    }

    .candidate {
        padding: 12px;
        border: 1px solid #ddd;
        margin: 10px 0;
        border-radius: 6px;
        cursor: pointer;
        transition: background 0.2s, border-color 0.2s;
    }

    .candidate.selected {
        background: #e9e9e9;
        border-color: #111;
    }

    .candidate input {
        margin-right: 10px;
    }

    button {
        width: 100%;
        padding: 14px;
        margin-top: 20px;
        font-size: 16px;
        cursor: pointer;
        border: none;
        border-radius: 6px;
        background: #333;
        color: white;
    }

    #status {
        margin-top: 15px;
        min-height: 20px;
    }

    .error { color: red; }
    .success { color: green; }
</style>
</head>

<body>

<div class="container">
    <h2 id="electionTitle">Pacopolis Mayor Election (2026)</h2>

    <div id="candidateList"></div>

    <button id="submitBtn">Submit Vote</button>

    <p id="status"></p>
</div>

<script>
const electionId = 12;
let selectedCandidateId = null;

const candidateList = document.getElementById("candidateList");
const status = document.getElementById("status");
const submitBtn = document.getElementById("submitBtn");


async function loadCandidates() {
    status.textContent = "Loading candidates...";

    try {
        const res = await fetch(`/api/vote/candidates?electionId=${electionId}`);

        if (!res.ok) {
            status.textContent = "Failed to load candidates.";
            status.className = "error";
            return;
        }

        const candidates = await res.json();
        candidateList.innerHTML = "";

        candidates.forEach(c => {
            const div = document.createElement("div");
            div.className = "candidate";
            div.dataset.id = c.candidateId;

            div.innerHTML = `
                <input type="radio" name="candidate" value="${c.candidateId}">
                ${c.name} (${c.party})
            `;

            div.addEventListener("click", () => selectCandidate(c.candidateId, div));
            candidateList.appendChild(div);
        });

        status.textContent = "";

    } catch (err) {
        status.textContent = "Server unreachable.";
        status.className = "error";
    }
}


function selectCandidate(id, element) {
    selectedCandidateId = id;

    document.querySelectorAll(".candidate").forEach(c => {
        c.classList.remove("selected");
        c.querySelector("input").checked = false;
    });

    element.classList.add("selected");
    element.querySelector("input").checked = true;
}


async function submitVote() {
    if (!selectedCandidateId) {
        status.textContent = "Please select a candidate.";
        status.className = "error";
        return;
    }

    const payload = {
        electionId,
        candidateId: selectedCandidateId,
        firstName: sessionStorage.getItem("firstName"),
        lastName: sessionStorage.getItem("lastName")
    };

    try {
        const res = await fetch("/api/vote/cast", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
        });

        const text = await res.text();

        if (!res.ok) {
            status.textContent = text || "Vote submission failed.";
            status.className = "error";
            return;
        }

        status.textContent = "Vote submitted successfully.";
        status.className = "success";

    } catch (err) {
        status.textContent = "Network error submitting vote.";
        status.className = "error";
    }
}


submitBtn.addEventListener("click", submitVote);
loadCandidates();
</script>

</body>
</html>
